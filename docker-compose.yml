services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: delta
      POSTGRES_PASSWORD: delta_local
      POSTGRES_DB: delta
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delta -d delta"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3100:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker

volumes:
  pgdata:
